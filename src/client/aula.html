<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Radar — Aula</title>
  <link rel="stylesheet" href="/styles/global.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="sesionTitulo">Aula</h1>
    <div class="topbar-right">
      <a href="/dashboard.html" class="link-button">← Salir de la sesión</a>
      <span id="userBadge"></span>
      <button id="logoutBtn" type="button">Salir</button>
    </div>
  </header>
  <main class="container container-wide">
    <section class="sesion-info">
      <p>
        <strong>Carta:</strong> <span id="cartaNombre">—</span>
        &nbsp;·&nbsp;
        <strong>Tu buque:</strong> <span id="ownshipBadge" class="badge">—</span>
      </p>
      <p id="descripcionEl" class="placeholder"></p>
    </section>

    <section class="carta-controls">
      <span class="placeholder">
        Por ahora solo ves la carta. Los controles de mando y el radar se incorporan en los próximos releases.
      </span>
      <span id="cartaInfo" class="placeholder"></span>
    </section>

    <section class="carta-viewport">
      <div id="loadingMsg" class="placeholder">Cargando aula...</div>
      <canvas id="cartaCanvas" hidden></canvas>
    </section>
  </main>
  <script type="module" src="/aula.ts"></script>
</body>
</html>
