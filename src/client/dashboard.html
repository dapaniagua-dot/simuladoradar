<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Radar — Panel</title>
  <link rel="stylesheet" href="/styles/global.css" />
</head>
<body>
  <header class="topbar">
    <h1>Simulador de Radar</h1>
    <div class="topbar-right">
      <span id="userBadge"></span>
      <button id="logoutBtn" type="button">Salir</button>
    </div>
  </header>
  <main class="container">
    <section id="alumnoView" hidden>
      <h2 id="alumnoHeading">Mis sesiones abiertas</h2>
      <div id="sesionesAbiertas"></div>
      <p id="sinSesionesMsg" class="placeholder" hidden>
        No tenés sesiones abiertas en este momento.<br>
        Cuando tu profesor habilite una sesión a la que estés asignado, va a aparecer acá automáticamente.
      </p>
    </section>
    <section id="profesorView" hidden>
      <p>Acceso al panel del profesor.</p>
      <p><a class="link-button" href="/mis-sesiones.html">Ir a Mis sesiones →</a></p>
    </section>
  </main>
  <script type="module" src="/dashboard.ts"></script>
</body>
</html>
