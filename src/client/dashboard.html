<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Radar — Panel</title>
  <link rel="stylesheet" href="/styles/global.css" />
</head>
<body>
  <header class="topbar">
    <h1>Simulador de Radar</h1>
    <div class="topbar-right">
      <span id="userBadge"></span>
      <button id="logoutBtn" type="button">Salir</button>
    </div>
  </header>
  <main class="container">
    <section id="alumnoView" hidden>
      <h2>Esperando que tu profesor habilite una sesión</h2>
      <p>Cuando el profesor abra una sesión a la que estés asignado, vas a verla aparecer en esta pantalla automáticamente.</p>
      <p class="placeholder">No tenés sesiones activas en este momento.</p>
    </section>
    <section id="profesorView" hidden>
      <p>Acceso al panel del profesor.</p>
      <p><a class="link-button" href="/mis-sesiones.html">Ir a Mis sesiones →</a></p>
    </section>
  </main>
  <script type="module" src="/dashboard.ts"></script>
</body>
</html>
